name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: financial_audit_ai
          POSTGRES_USER: financial_audit_ai
          POSTGRES_PASSWORD: ci-local-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U financial_audit_ai -d financial_audit_ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      TESTING: "true"
      DATABASE_URL: postgresql+psycopg://financial_audit_ai:ci-local-password@localhost:5432/financial_audit_ai
      LLM_PROVIDER: deterministic-fallback
      EMBEDDING_PROVIDER: deterministic-local
      OCR_PROVIDER: pymupdf-local
      RAG_RERANK_PROVIDER: deterministic-fallback
      RAG_ANSWER_PROVIDER: deterministic-fallback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run repository safety checks
        run: |
          python scripts/danger_check.py
          python scripts/production_safety_check.py

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Docker Compose config
        run: docker compose config

      # Playwright E2E is intentionally left out of this minimal CI because it
      # requires browser and service startup orchestration.
